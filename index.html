<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Input Data</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  padding:20px;
}

form {
  background:white;
  padding:20px;
  border-radius:10px;
  max-width:400px;
  margin:auto;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

label {
  display:block;
  margin-top:15px;
  font-weight:bold;
}

input, select {
  width:100%;
  padding:8px;
  margin-top:5px;
  border:1px solid #ccc;
  border-radius:5px;
}

.code-group {
  display: grid;
  grid-template-columns: 60px 15px 1fr 15px 1fr 15px 1fr 15px 1fr;
  align-items: center;
  gap: 5px;
  width: 100%;
}

.code-group input {
  width: 100%;
  text-align: center;
}

.code-group input:first-child {
  background: #eee;
  font-weight: bold;
}

.code-group span {
  text-align: center;
  font-weight: bold;
}

button {
  margin-top:20px;
  width:100%;
  padding:10px;
  background:#007BFF;
  color:white;
  border:none;
  border-radius:5px;
  font-size:16px;
  cursor:pointer;
}

.time-group{
  display:flex;
  gap:10px;
}

.time-group div{
  flex:1;
}

.range-table{
display:grid;
grid-template-columns:40px 1fr 1fr 1fr;
gap:6px;
margin-top:10px;
align-items:center;
}

.range-title{
font-weight:bold;
text-align:center;
background:#f2f2f2;
padding:6px;
border-radius:4px;
}

.range-table input{
text-align:center;
}

.checkbox-group{
  margin-top:8px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.checkbox-group label{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
  font-weight:normal;
  margin-top:0;
}

.checkbox-group input{
  width:auto;
}

button:hover {
  background:#0056b3;
}
</style>
</head>

  <button type="submit" id="submitBtn">Kirim</button>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbyNeXpUDnDose2eFL8I6o2OPTDjYSjt89c_73DAMxDq28C8n-8ZPCnKxV7PwES3bUBDow/exec";
const form = document.getElementById("dataForm");
const submitBtn = document.getElementById("submitBtn");

// Auto uppercase saat mengetik
["X1","X2","X3","X4"].forEach(id => {
  document.getElementById(id).addEventListener("input", function() {
    this.value = this.value.toUpperCase();
  });
});

form.addEventListener("submit", function(e){
  e.preventDefault();

  // === Ambil & format Instrument Code ===
  const x1 = document.getElementById("X1").value.trim().toUpperCase();
  const x2 = document.getElementById("X2").value.trim().toUpperCase();
  const x3 = document.getElementById("X3").value.trim().toUpperCase();

  if (!x1 || !x2) {
    alert("X1 dan X2 wajib diisi");
    return;
  }

  let finalCode = `TJN-${x1}-${x2}`;

  if (x3 !== "") {
    finalCode += `-${x3}`;
  }

  document.getElementById("InstrumentCode").value = finalCode;
  
  // Gabungkan checkbox identitas standard
const checks = document.querySelectorAll(".stdCheck:checked");

let selected = [];

checks.forEach(c=>{
  selected.push(c.value);
});

if(selected.length === 0){
  alert("Pilih minimal satu Identitas Standard");
  return;
}

document.getElementById("IdentitasStandard").value = selected.join(", ");

  const formData = new FormData(form);

  submitBtn.disabled = true;
  submitBtn.textContent = "Mengirim...";

  fetch(scriptURL, {
    method: "POST",
    mode: "no-cors",
    body: formData
  })
  .then(() => {
    alert("✅ Data berhasil dikirim\nKode: " + finalCode);
    form.reset();
  })
  .catch(err => {
    alert("❌ Error: " + err);
  })
  .finally(() => {
    submitBtn.disabled = false;
    submitBtn.textContent = "Kirim";
  });

});

</script>

</html>
